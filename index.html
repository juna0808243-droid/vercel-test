<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vercel デプロイ練習</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <h1>🚀 Vercel デプロイ練習</h1>
    <p>このページが表示されていれば、デプロイ成功です！</p>
    <p>デプロイのテスト</p>

    <div class="counter-box">
      <p>クリックカウンター</p>
      <div id="count">0</div>
      <div class="buttons">
        <button id="decrement">−</button>
        <button id="reset">リセット</button>
        <button id="increment">＋</button>
      </div>
    </div>

    <p class="timestamp" id="clock"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
